<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Othello - Configuration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/setup.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <main class="setup-card">
        <!-- Title -->
        <div class="setup-title">
          <p class="setup-eyebrow">Préparation de</p>
          <div class="setup-title-row">
            <img
              src="/img/pions/pion-noir-3-arme.svg"
              alt="Logo Ninja"
              class="setup-logo-main"
            />
            <h1 class="setup-title-text">LA PARTIE</h1>
            <img
              src="/img/pions/pion-blanc-2-arme.svg"
              alt="Logo Samuraï île"
              class="setup-logo-secondary"
            />
          </div>
        </div>

        <!-- Player 1 bar -->
        <div class="player1-bar">
          <span class="player1-bar-label">Joueur 1</span>
          <span id="player-one-label" class="player1-bar-name"></span>
        </div>

        <!-- Hidden functional selects (required by JS) -->
        <select id="player-two-type" class="hidden">
          <option value="local">Joueur local</option>
          <option value="ai" selected>IA</option>
          <option value="connected">Joueur connecté</option>
        </select>
        <select id="ai-difficulty" class="hidden">
          <option value="easy">Facile</option>
          <option value="medium" selected>Moyen</option>
          <option value="hard">Difficile</option>
        </select>
        <select id="player-color" class="hidden">
          <option value="black" selected>Noir</option>
          <option value="white">Blanc</option>
        </select>

        <!-- Opponent panel -->
        <div class="setup-panel-box">
          <p class="panel-label">Joueur 2 :</p>
          <div class="opponent-options">
            <!-- AI row -->
            <div class="opponent-row opponent-row-ai">
              <button
                class="opponent-btn active"
                type="button"
                data-type="ai"
                onclick="selectOpponent('ai')"
              >
                <img
                  src="/img/icones/robot-ia.svg"
                  alt="IA"
                  class="opponent-icon"
                />
                <span>IA</span>
              </button>
              <div id="difficulty-btns" class="diff-pills">
                <button
                  class="diff-btn"
                  type="button"
                  data-diff="easy"
                  onclick="selectDifficulty('easy')"
                >
                  Mini-shinobi <span class="diff-level">Facile</span>
                </button>
                <button
                  class="diff-btn active"
                  type="button"
                  data-diff="medium"
                  onclick="selectDifficulty('medium')"
                >
                  Ninja furtif <span class="diff-level">Moyen</span>
                </button>
                <button
                  class="diff-btn"
                  type="button"
                  data-diff="hard"
                  onclick="selectDifficulty('hard')"
                >
                  Empereur des ninjas <span class="diff-level">Difficile</span>
                </button>
              </div>
            </div>
            <!-- Local player row -->
            <div class="opponent-row">
              <button
                class="opponent-btn"
                type="button"
                data-type="local"
                onclick="selectOpponent('local')"
              >
                <img
                  src="/img/icones/joueur2-local.svg"
                  alt="Joueur local"
                  class="opponent-icon"
                />
                <span>Joueur local</span>
              </button>
            </div>
          </div>
          <p id="player-two-help" class="helper-text"></p>
        </div>

        <!-- Second player login panel (hidden, used by JS for connected mode) -->
        <section id="second-player-panel" class="setup-panel hidden">
          <h2 class="second-panel-title">Connexion du joueur 2</h2>
          <form id="second-player-form" onsubmit="loginSecondPlayer(event)">
            <label class="field-label" for="second-pseudo">Pseudo</label>
            <input
              id="second-pseudo"
              class="field-control"
              type="text"
              placeholder="Pseudo du joueur 2"
            />
            <label class="field-label" for="second-mdp">Mot de passe</label>
            <input
              id="second-mdp"
              class="field-control"
              type="password"
              placeholder="Mot de passe du joueur 2"
            />
            <p id="second-error" class="feedback-error"></p>
            <p id="second-success" class="feedback-success"></p>
            <div class="second-player-actions">
              <button class="btn-connect" type="submit">
                Connecter le joueur 2
              </button>
              <button
                id="clear-second-player"
                class="btn-clear hidden"
                type="button"
              >
                Retirer
              </button>
            </div>
          </form>
          <div id="second-player-summary" class="second-player-summary hidden">
            <span>Joueur 2 connecté</span>
            <strong id="player-two-label"></strong>
          </div>
        </section>

        <!-- Color choice panel -->
        <div class="setup-panel-box">
          <p class="panel-label">Choix de couleur :</p>
          <div class="color-toggle">
            <div
              class="color-half color-option active"
              data-color="black"
              onclick="selectColor('black')"
              role="button"
              tabindex="0"
              aria-label="Pions noirs"
            >
              <img
                src="/img/pions/pion-noir-3-arme.svg"
                alt="Pion noir"
                class="color-pion"
              />
              <img
                src="/img/persos/profil-ninja.svg"
                alt="Ninja"
                class="color-perso"
              />
            </div>
            <div
              class="color-half color-option"
              data-color="white"
              onclick="selectColor('white')"
              role="button"
              tabindex="0"
              aria-label="Pions blancs"
            >
              <img
                src="/img/persos/profil-samourai.svg"
                alt="Samouraï"
                class="color-perso"
              />
              <img
                src="/img/pions/pion-blanc-2-arme.svg"
                alt="Pion blanc"
                class="color-pion"
              />
            </div>
          </div>
          <p class="color-hint">
            ⚫ Le joueur noir commence toujours la partie.
          </p>
        </div>

        <!-- Error message -->
        <p id="setup-error" class="setup-error-msg"></p>
        <p id="setup-subtitle" class="hidden"></p>

        <!-- Footer actions -->
        <footer class="setup-footer">
          <a href="/connexion.html" class="btn-retour">&lt; Retour</a>
          <button id="setup-rule-link" class="btn-rules" type="button">
            <img src="/img/icones/doc-regles.svg" alt="" aria-hidden="true" />
            <span>Règles</span>
          </button>
          <button id="setup-stats-link" class="btn-stats" type="button">
            <img src="/img/icones/stats.svg" alt="" aria-hidden="true" />
            <span>Statistiques</span>
          </button>
          <button
            class="btn-valider"
            type="button"
            onclick="startConfiguredGame()"
          >
            Valider et jouer &gt;
          </button>
        </footer>
      </main>
    </div>

    <dialog id="setup-rule-dialog">
      <div id="setup-rule-dialog-content"></div>
    </dialog>

    <script src="/js/setup.js"></script>
  </body>
</html>
