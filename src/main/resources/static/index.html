<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Othello</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/accueil.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 440px;">
        <div class="card shadow-sm border-0 rounded-4 p-4">

            <!-- Logo -->
            <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
                <div class="pion noir"></div>
                <h1 class="h3 fw-bold mb-0">Ninja Warrior</h1>
                <div class="pion blanc"></div>
            </div>

            <!-- Onglets -->
            <ul class="nav nav-tabs mb-4" id="authTabs">
                <li class="nav-item flex-fill text-center">
                    <button class="nav-link active w-100" onclick="showTab('connexion', this)">Connexion</button>
                </li>
                <li class="nav-item flex-fill text-center">
                    <button class="nav-link w-100" onclick="showTab('inscription', this)">Inscription</button>
                </li>
            </ul>

            <!-- Formulaires -->
            <div class="forms-wrapper">

            <!-- Formulaire Connexion -->
            <form id="connexion" class="auth-form" onsubmit="login(event)">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pseudo</label>
                    <input type="text" id="login-pseudo" class="form-control" placeholder="Votre pseudo" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="login-mdp" class="form-control" placeholder="Votre mot de passe" required />
                </div>
                <p class="text-danger small" id="login-error"></p>
                <p class="text-success small" id="login-success"></p>
                <button type="submit" class="btn btn-dark w-100">Se connecter</button>
            </form>

            <!-- Formulaire Inscription -->
            <form id="inscription" class="auth-form d-none" onsubmit="register(event)">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pseudo</label>
                    <input type="text" id="reg-pseudo" class="form-control" placeholder="Choisissez un pseudo" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" id="reg-mail" class="form-control" placeholder="Votre email" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="reg-mdp" class="form-control" placeholder="Choisissez un mot de passe" required />
                </div>
                <p class="text-danger small" id="reg-error"></p>
                <p class="text-success small" id="reg-success"></p>
                <button type="submit" class="btn btn-dark w-100">S'inscrire</button>
            </form>

            </div><!-- /forms-wrapper -->

            <!-- Séparateur -->
            <div class="d-flex align-items-center gap-2 my-4 text-muted small">
                <hr class="flex-grow-1 m-0">
                <span>ou</span>
                <hr class="flex-grow-1 m-0">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Adversaire</label>
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="game-mode" id="mode-human" value="human" checked>
                        <label class="form-check-label" for="mode-human">Joueur</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="game-mode" id="mode-ai" value="ai">
                        <label class="form-check-label" for="mode-ai">IA</label>
                    </div>
                </div>
            </div>

            <div class="mb-3" id="difficulty-wrapper">
                <label for="ai-difficulty" class="form-label fw-semibold">Difficulté IA</label>
                <select id="ai-difficulty" class="form-select">
                    <option value="easy">Facile</option>
                    <option value="medium" selected>Moyen</option>
                    <option value="hard">Difficile</option>
                </select>
            </div>

            <div id="session-panel" class="session-panel mt-4">
                <div class="session-card mb-3">
                    <div class="d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <p class="text-uppercase small text-muted mb-1">Joueur noir</p>
                            <strong id="player-one-name">Aucun joueur connecté</strong>
                            <p id="player-one-meta" class="small text-muted mb-0">Connectez-vous pour enregistrer vos parties.</p>
                        </div>
                        <button id="logout-primary" type="button" class="btn btn-sm btn-outline-secondary d-none" onclick="logoutPrimary()">Déconnecter</button>
                    </div>
                </div>

                <div id="second-player-panel" class="session-card mb-3 d-none">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                        <div>
                            <p class="text-uppercase small text-muted mb-1">Joueur blanc</p>
                            <strong id="player-two-name">Aucun joueur connecté</strong>
                            <p id="player-two-meta" class="small text-muted mb-0">Connectez le second joueur pour enregistrer l'historique des deux côtés.</p>
                        </div>
                        <button id="logout-secondary" type="button" class="btn btn-sm btn-outline-secondary d-none" onclick="logoutSecondary()">Déconnecter</button>
                    </div>

                    <form id="second-player-form" onsubmit="loginSecondPlayer(event)">
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Pseudo du joueur blanc</label>
                            <input type="text" id="second-pseudo" class="form-control" placeholder="Pseudo du second joueur">
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Mot de passe</label>
                            <input type="password" id="second-mdp" class="form-control" placeholder="Mot de passe du second joueur">
                        </div>
                        <p class="text-danger small mb-2" id="second-error"></p>
                        <p class="text-success small mb-2" id="second-success"></p>
                        <button type="submit" class="btn btn-outline-dark w-100">Connecter le joueur blanc</button>
                    </form>
                </div>

                <p id="launch-error" class="text-danger small mb-2"></p>
                <button id="launch-game" type="button" class="btn btn-success w-100" onclick="startSelectedGame()">Lancer la partie</button>
            </div>

            <button class="btn btn-outline-secondary w-100" onclick="playAsGuest()">Jouer en invité</button>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/accueil.js"></script>
</body>
</html>
