<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Othello - Jeu</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/grille.css" />
  </head>
  <body>
    <div class="game-shell">
      <p id="game-error" class="game-error hidden"></p>

      <main class="game-layout">
        <section class="score-panel score-panel-left" aria-label="Score des noirs">
          <img
            class="score-avatar"
            src="/img/persos/profil-ninja.svg"
            alt="Profil joueur noir"
          />
          <p class="score-label">Noirs</p>
          <p id="black-player-name" class="score-player">Invité</p>
          <p id="score-noir" class="score-value">00</p>
          <img
            class="score-pion"
            src="/img/pions/pion-noir-3-arme.svg"
            alt="Pion noir"
          />
        </section>

        <section class="board-section" aria-label="Plateau de jeu">
          <div class="board-stage">
            <img class="board-top" src="/img/plateau/haut-plateau.svg" alt="Decor haut du plateau" />
            <div class="board-base">
              <div class="board-skin">
                <div class="planche">
        <div class="case" id="A1" data-state="empty"></div>
        <div class="case" id="B1" data-state="empty"></div>
        <div class="case" id="C1" data-state="empty"></div>
        <div class="case" id="D1" data-state="empty"></div>
        <div class="case" id="E1" data-state="empty"></div>
        <div class="case" id="F1" data-state="empty"></div>
        <div class="case" id="G1" data-state="empty"></div>
        <div class="case" id="H1" data-state="empty"></div>

        <div class="case" id="A2" data-state="empty"></div>
        <div class="case" id="B2" data-state="empty"></div>
        <div class="case" id="C2" data-state="empty"></div>
        <div class="case" id="D2" data-state="empty"></div>
        <div class="case" id="E2" data-state="empty"></div>
        <div class="case" id="F2" data-state="empty"></div>
        <div class="case" id="G2" data-state="empty"></div>
        <div class="case" id="H2" data-state="empty"></div>

        <div class="case" id="A3" data-state="empty"></div>
        <div class="case" id="B3" data-state="empty"></div>
        <div class="case" id="C3" data-state="empty"></div>
        <div class="case" id="D3" data-state="empty"></div>
        <div class="case" id="E3" data-state="empty"></div>
        <div class="case" id="F3" data-state="empty"></div>
        <div class="case" id="G3" data-state="empty"></div>
        <div class="case" id="H3" data-state="empty"></div>

        <div class="case" id="A4" data-state="empty"></div>
        <div class="case" id="B4" data-state="empty"></div>
        <div class="case" id="C4" data-state="empty"></div>
        <div class="case" id="D4" data-state="empty"></div>
        <div class="case" id="E4" data-state="empty"></div>
        <div class="case" id="F4" data-state="empty"></div>
        <div class="case" id="G4" data-state="empty"></div>
        <div class="case" id="H4" data-state="empty"></div>

        <div class="case" id="A5" data-state="empty"></div>
        <div class="case" id="B5" data-state="empty"></div>
        <div class="case" id="C5" data-state="empty"></div>
        <div class="case" id="D5" data-state="empty"></div>
        <div class="case" id="E5" data-state="empty"></div>
        <div class="case" id="F5" data-state="empty"></div>
        <div class="case" id="G5" data-state="empty"></div>
        <div class="case" id="H5" data-state="empty"></div>

        <div class="case" id="A6" data-state="empty"></div>
        <div class="case" id="B6" data-state="empty"></div>
        <div class="case" id="C6" data-state="empty"></div>
        <div class="case" id="D6" data-state="empty"></div>
        <div class="case" id="E6" data-state="empty"></div>
        <div class="case" id="F6" data-state="empty"></div>
        <div class="case" id="G6" data-state="empty"></div>
        <div class="case" id="H6" data-state="empty"></div>

        <div class="case" id="A7" data-state="empty"></div>
        <div class="case" id="B7" data-state="empty"></div>
        <div class="case" id="C7" data-state="empty"></div>
        <div class="case" id="D7" data-state="empty"></div>
        <div class="case" id="E7" data-state="empty"></div>
        <div class="case" id="F7" data-state="empty"></div>
        <div class="case" id="G7" data-state="empty"></div>
        <div class="case" id="H7" data-state="empty"></div>

        <div class="case" id="A8" data-state="empty"></div>
        <div class="case" id="B8" data-state="empty"></div>
        <div class="case" id="C8" data-state="empty"></div>
        <div class="case" id="D8" data-state="empty"></div>
        <div class="case" id="E8" data-state="empty"></div>
        <div class="case" id="F8" data-state="empty"></div>
        <div class="case" id="G8" data-state="empty"></div>
        <div class="case" id="H8" data-state="empty"></div>
                </div>
              </div>
            </div>
          </div>
          <p id="timer-display" class="timer-display board-timer">Temps : 00:00</p>
        </section>

        <section class="score-panel score-panel-right" aria-label="Score des blancs">
          <img
            class="score-avatar"
            src="/img/persos/profil-samourai.svg"
            alt="Profil joueur blanc"
          />
          <p class="score-label">Blancs</p>
          <p id="white-player-name" class="score-player">Invité</p>
          <p id="score-blanc" class="score-value">00</p>
          <img
            class="score-pion"
            src="/img/pions/pion-blanc-2-arme.svg"
            alt="Pion blanc"
          />
        </section>

        <nav class="icon-toolbar" aria-label="Actions du jeu">
          <button id="pause-link" class="icon-btn" type="button" title="Pause" aria-label="Pause">
            <img src="/img/icones/pause.svg" alt="Pause" />
          </button>
          <button id="rule-link" class="icon-btn" type="button" title="Regles" aria-label="Regles">
            <img src="/img/icones/doc-regles.svg" alt="Regles" />
          </button>
          <a class="icon-btn" href="/setup.html" title="Retour à la configuration" aria-label="Retour à la configuration de la partie">
            <img src="/img/icones/retour-arriere.svg" alt="Quitter la partie" />
          </a>
          <a class="icon-btn" href="/connexion.html" title="Déconnexion" aria-label="Déconnexion">
            <img src="/img/icones/sortie.svg" alt="Déconnexion" />
          </a>
        </nav>

        <div class="assistant-wrapper">
          <div id="hint-bubble" class="hint-bubble hidden">
            <button id="hint-close" class="hint-bubble-close" type="button" aria-label="Fermer">✕</button>
            <p id="hint-text" class="hint-text"></p>
          </div>
          <button
            id="hint-btn"
            class="assistant-fab"
            type="button"
            title="Demander un conseil a l'IA"
            aria-label="Demander un conseil a l'IA"
          >
            <img
              src="/img/persos/profil-nain-jardin-converse.svg"
              alt="Assistant IA"
            />
          </button>
        </div>
      </main>

      <dialog id="rule-dialog">
        <div id="rule-dialog-content"></div>
      </dialog>

    <dialog id="pause-dialog">
      <div id="pause-dialog-content">
        <h2 class="pause-title">EN PAUSE</h2>
        <div class="pause-hero" aria-hidden="true">
          <img class="pause-illustration" src="/img/persos/nain-pause-zen.svg" alt="" />
        </div>
        <div class="pause-meta">
          <p id="pause-timer" class="pause-value"></p>
          <p id="pause-score" class="pause-value"></p>
          <p id="pause-mode" class="pause-value"></p>
          <div class="end-actions">
            <button id="pause-resume-btn" class="end-btn-primary" type="button">Reprendre</button>
            <a class="end-btn-secondary" href="/setup.html">Quitter la partie</a>
          </div>
        </div>
      </div>
    </dialog>

    <dialog id="end-dialog">
      <div id="end-dialog-content">
        <h2 id="end-title"></h2>
        <div class="end-duel" aria-label="Resultat des joueurs">
          <figure class="end-player end-player-black">
            <p id="end-black-status" class="end-player-status"></p>
            <img id="end-black-avatar" class="end-avatar" src="" alt="" />
            <figcaption id="end-black-name" class="end-player-name"></figcaption>
          </figure>
          <figure class="end-player end-player-white">
            <p id="end-white-status" class="end-player-status"></p>
            <img id="end-white-avatar" class="end-avatar" src="" alt="" />
            <figcaption id="end-white-name" class="end-player-name"></figcaption>
          </figure>
        </div>
        <p id="end-score" class="end-score"></p>
        <p id="end-mode" class="end-mode"></p>
        <div class="end-actions">
          <a class="end-btn-primary" href="/setup.html">Rejouer</a>
          <button id="end-stats-btn" class="end-btn-secondary" type="button">Mes statistiques</button>
        </div>
      </div>
    </dialog>

    <script src="/js/music.js"></script>
    <script src="/js/sakura.js"></script>
    <script src="/js/grille.js"></script>
  </body>
</html>
