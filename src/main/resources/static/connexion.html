<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Othello</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/accueil.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 440px;">
        <div class="card shadow-sm border-0 rounded-4 p-4">

            <!-- Logo -->
            <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
                <div class="pion noir"><img src="img/pions/pion-noir-4-arme.svg" alt="shuriken"></div>
                <h1 class="h3 fw-bold mb-0"><img src="img/logo-jeu-ninja.svg" alt="Ninja Warrior">Prêt à combattre?</h1>
                <div class="pion blanc"><img src="img/pions/pion-blanc-2-arme.svg" alt="kunai"></div>
            </div>

            <!-- Onglets -->
            <ul class="nav nav-tabs mb-4" id="authTabs">
                <li class="nav-item flex-fill text-center">
                    <button class="nav-link active w-100" onclick="showTab('connexion', this)">Connexion</button>
                </li>
                <li class="nav-item flex-fill text-center">
                    <button class="nav-link w-100" onclick="showTab('inscription', this)">Inscription</button>
                </li>
            </ul>

            <!-- Formulaires -->
            <div class="forms-wrapper">

            <!-- Formulaire Connexion -->
            <form id="connexion" class="auth-form" onsubmit="login(event)">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pseudo</label>
                    <input type="text" id="login-pseudo" class="form-control" placeholder="Votre pseudo" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="login-mdp" class="form-control" placeholder="Votre mot de passe" required />
                </div>
                <p class="text-danger small" id="login-error"></p>
                <p class="text-success small" id="login-success"></p>
            </form>

            <!-- Formulaire Inscription -->
            <form id="inscription" class="auth-form d-none" onsubmit="register(event)">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pseudo</label>
                    <input type="text" id="reg-pseudo" class="form-control" placeholder="Choisissez un pseudo" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" id="reg-mail" class="form-control" placeholder="Votre email" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="reg-mdp" class="form-control" placeholder="Choisissez un mot de passe" required />
                </div>
                <p class="text-danger small" id="reg-error"></p>
                <p class="text-success small" id="reg-success"></p>
            </form>

            </div><!-- /forms-wrapper -->

            <button id="submit-btn" type="button" class="btn button-principale w-100" onclick="submitActiveForm()">Se connecter</button>
            <div class="d-flex align-items-center gap-2 my-4 text-muted small">
                <hr class="flex-grow-1 m-0">
                <span>ou</span>
                <hr class="flex-grow-1 m-0">
            </div>
            <button class="btn button-secondary w-100" onclick="playAsGuest()">Jouer en invité</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/accueil.js"></script>
</body>
</html>
