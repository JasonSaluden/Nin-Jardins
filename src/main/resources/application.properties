# Base de données
spring.datasource.url=jdbc:mysql://localhost:3306/othello?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=othello_user
spring.datasource.password=othello_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - crée/met à jour les tables automatiquement depuis les entités
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Spring AI - Ollama (doit tourner en local sur le port par défaut)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b
# Temperature : 0.0 = très strict/déterministe, 1.0 = très créatif/aléatoire
spring.ai.ollama.chat.options.temperature=0.4

# Serveur
server.port=8080
